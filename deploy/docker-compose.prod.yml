# PharmaVie — stack production VPS
# Usage : cd deploy && docker compose -f docker-compose.prod.yml up -d --build

name: pharmavie-prod

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: pharmavie-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pharmavie
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pharmavie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pharmavie -d pharmavie']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: pharmavie-prod-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: pharmavie-prod-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://pharmavie:${POSTGRES_PASSWORD}@postgres:5432/pharmavie?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CINETPAY_API_KEY: ${CINETPAY_API_KEY:-}
      CINETPAY_SITE_ID: ${CINETPAY_SITE_ID:-}
    volumes:
      - uploads_data:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: pharmavie-prod-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: pharmavie-prod-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/pharmavie.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    container_name: pharmavie-prod-certbot
    profiles:
      - certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
