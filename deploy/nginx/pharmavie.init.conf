# PharmaVie — Nginx HTTP temporaire (obtention certificat SSL)
# Utilisé AVANT le déploiement complet — copier vers pharmavie.active.conf

server {
    listen 80;
    server_name pharmavie.space api.pharmavie.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'PharmaVie — deploiement en cours. SSL a obtenir.';
        add_header Content-Type text/plain;
    }
}
