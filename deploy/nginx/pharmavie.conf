# PharmaVie — Nginx HTTPS (pharmavie.space)
# Copié vers pharmavie.active.conf après obtention SSL

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name pharmavie.space api.pharmavie.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Web (Next.js) ---
server {
    listen 443 ssl http2;
    server_name pharmavie.space;

    ssl_certificate     /etc/letsencrypt/live/pharmavie.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pharmavie.space/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10M;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# --- API (NestJS) + uploads ---
server {
    listen 443 ssl http2;
    server_name api.pharmavie.space;

    ssl_certificate     /etc/letsencrypt/live/pharmavie.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pharmavie.space/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10M;

    location / {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
